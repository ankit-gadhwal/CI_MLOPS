name: CI pipeline

on: push

jobs:
  project-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc

      # 🔍 Debug (optional but useful)
      - name: Check files
        run: |
          echo "Files in repo:"
          ls -R

      # 🚀 Run pipeline
      - name: Run DVC pipeline
        env:
          DAGSHUB_TOKEN: ${{secrets.CI_MLOPS}}
        run: dvc repro